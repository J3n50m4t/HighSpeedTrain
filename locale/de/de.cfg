[mod-name]
title=HighSpeedTrain

[mod-description]
description=Adds extremly fast Trains and Wagons.

[mod-setting-name]
highspeedtrain-no-fuel=Hochgeschwindigkeitszüge brauchen keinen Treibstoff
highspeedtrain-free-mode=Rezepte und Forschung kostenlos

[mod-setting-description]
highspeedtrain-no-fuel=Wenn aktiviert, nutzen alle HighSpeedTrain-Lokomotiven eine Void-Energiequelle und fahren ohne Brennstoff.
highspeedtrain-free-mode=Wenn aktiviert, werden alle HighSpeedTrain-Rezepte ohne Zutaten direkt freigeschaltet. Die zugehörigen Technologien werden ausgeblendet, da keine Forschung mehr nötig ist.

