[mod-name]
title=HighSpeedTrain

[mod-description]
description=Adds high-speed locomotives and matching wagons for fast rail transport.

[mod-setting-name]
highspeedtrain-no-fuel=High-speed trains do not need fuel
highspeedtrain-free-mode=Free recipes and instant unlocks

[mod-setting-description]
highspeedtrain-no-fuel=When enabled, all HighSpeedTrain locomotives use a void energy source and run without fuel.
highspeedtrain-free-mode=When enabled, all HighSpeedTrain recipes unlock immediately and require no ingredients. Their technologies are hidden because no research is needed anymore.

