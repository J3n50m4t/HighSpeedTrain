highspeed-artillery-wagon=High-Speed Artillery Wagon

[entity-description]
highspeed-locomotive=Around 4 times faster than a standard locomotive.
highspeed-locomotiveMK2=Around 5 times faster than a standard locomotive.
highspeed-locomotiveMK3=Around 7 times faster than a standard locomotive.
highspeed-locomotiveMK4=Built for extreme top speed.
highspeed-cargo-wagon=Cargo wagon designed for high-speed trains.
highspeed-cargo-wagonMK2=Upgraded cargo wagon for the fastest trains.
highspeed-fluid-wagon=Fluid wagon designed for high-speed trains.
highspeed-fluid-wagonMK2=Upgraded fluid wagon for the fastest trains.
highspeed-artillery-wagon=Artillery wagon designed for high-speed trains.

